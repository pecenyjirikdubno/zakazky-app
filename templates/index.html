{% extends "base.html" %}

{% block content %}
<h1>Seznam zakázek</h1>
<a href="{{ url_for('add') }}">+ Nová zakázka</a>
<ul>
    {% for z in zakazky %}
        <li>
            <a href="{{ url_for('zakazka_detail', zakazka_id=z.id) }}">
                {{ z.nazev }} - {{ z.popis }}
                {% if z.closed %}(UZAVŘENA){% endif %}
            </a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
