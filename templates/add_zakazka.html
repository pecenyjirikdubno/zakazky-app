<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Přidat zakázku</title>
</head>
<body>
    <h1>Přidat novou zakázku</h1>
    <form method="POST">
        <label>Název zakázky:</label>
        <input type="text" name="nazev" required><br><br>
        <label>Popis:</label>
        <textarea name="popis" required></textarea><br><br>
        <label>Cena:</label>
        <input type="number" step="0.01" name="cena" required><br><br>
        <button type="submit">Přidat zakázku</button>
    </form>
    <p><a href="/">Zpět na hlavní stránku</a></p>
</body>
</html>
